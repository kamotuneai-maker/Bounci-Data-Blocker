<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bounci</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 100%);
      color: #e0e0e0;
      min-width: 320px;
      min-height: 400px;
    }
    
    .container {
      padding: 20px;
    }
    
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid #2a2a3a;
    }
    
    .logo {
      width: 48px;
      height: 48px;
      border-radius: 12px;
    }
    
    .brand h1 {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
    }
    
    .brand p {
      font-size: 12px;
      color: #8b5cf6;
    }
    
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      border-radius: 8px;
      margin-bottom: 20px;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .status span {
      font-size: 13px;
      color: #22c55e;
    }
    
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .stat-card {
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 10px;
      padding: 16px;
      text-align: center;
    }
    
    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
    }
    
    .stat-label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 4px;
    }
    
    .stat-card.critical .stat-value {
      color: #ff4444;
    }
    
    .recent-section h3 {
      font-size: 13px;
      color: #888;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .recent-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 200px;
      overflow-y: auto;
    }
    
    .recent-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      font-size: 12px;
    }
    
    .recent-item .tool {
      font-size: 16px;
      flex-shrink: 0;
    }
    
    .recent-item .preview {
      flex: 1;
      color: #aaa;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    .recent-item .risk {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    
    .dashboard-link {
      display: block;
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
      color: #fff;
      text-align: center;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      margin-top: 20px;
      transition: opacity 0.2s;
    }
    
    .dashboard-link:hover {
      opacity: 0.9;
    }

    /* Scrollbar styling */
    .recent-list::-webkit-scrollbar {
      width: 6px;
    }
    .recent-list::-webkit-scrollbar-track {
      background: #1a1a24;
      border-radius: 3px;
    }
    .recent-list::-webkit-scrollbar-thumb {
      background: #3a3a4a;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="Benny.png" alt="Benny" class="logo">
      <div class="brand">
        <h1>Bounci</h1>
        <p>🎩 Benny's on duty</p>
      </div>
    </div>
    
    <div class="status">
      <div class="status-dot"></div>
      <span>Monitoring Active</span>
    </div>
    
    <div class="stats">
      <div class="stat-card">
        <div class="stat-value" id="totalPrompts">0</div>
        <div class="stat-label">Prompts Today</div>
      </div>
      <div class="stat-card critical">
        <div class="stat-value" id="risksFound">0</div>
        <div class="stat-label">Risks Found</div>
      </div>
    </div>
    
    <div class="recent-section">
      <h3>Recent Activity</h3>
      <div class="recent-list" id="recentList">
        <div class="recent-item">
          <span class="tool">👀</span>
          <span class="preview">Waiting for activity...</span>
        </div>
      </div>
    </div>
    
    <a href="https://app.bounciai.com" target="_blank" class="dashboard-link">
      Open Full Dashboard →
    </a>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
